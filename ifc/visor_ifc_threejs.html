<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D IFC - Vivienda Silvia Cedeno</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 350px;
            z-index: 100;
        }
        #info h2 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 18px;
        }
        #info p { margin: 5px 0; }
        #info .highlight { color: #00ff88; font-weight: bold; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        .btn.active {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
        }
        #legend {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }
        #legend h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            font-size: 12px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 3px;
        }
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loading p {
            color: #fff;
            margin-top: 20px;
            font-size: 16px;
        }
        #selected-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 212, 255, 0.9);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Cargando modelo 3D...</p>
    </div>

    <div id="container"></div>

    <div id="info">
        <h2>Vivienda Silvia Cedeno</h2>
        <p>Proyecto: <span class="highlight">BIMx Export</span></p>
        <p>Niveles: <span class="highlight">5</span> (0m - 12m)</p>
        <p>Columnas: <span class="highlight">64</span></p>
        <p>Vigas: <span class="highlight">60</span></p>
        <p>Muros: <span class="highlight">310</span></p>
        <p>Escaleras: <span class="highlight">86</span></p>
        <p style="margin-top:10px; font-size:12px; color:#888;">
            Click + Arrastrar: Rotar<br>
            Scroll: Zoom<br>
            Click derecho + Arrastrar: Pan
        </p>
    </div>

    <div id="legend">
        <h3>Leyenda</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #e74c3c;"></div>
            <span>Columnas</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #3498db;"></div>
            <span>Vigas</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #95a5a6;"></div>
            <span>Muros</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #f39c12;"></div>
            <span>Escaleras</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #27ae60;"></div>
            <span>Losas/Pisos</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #9b59b6;"></div>
            <span>Barandillas</span>
        </div>
    </div>

    <div id="controls">
        <button class="btn active" onclick="toggleElement('columns')">Columnas</button>
        <button class="btn active" onclick="toggleElement('beams')">Vigas</button>
        <button class="btn active" onclick="toggleElement('walls')">Muros</button>
        <button class="btn active" onclick="toggleElement('stairs')">Escaleras</button>
        <button class="btn active" onclick="toggleElement('floors')">Pisos</button>
        <button class="btn" onclick="resetView()">Reset Vista</button>
        <button class="btn" onclick="toggleWireframe()">Wireframe</button>
    </div>

    <div id="selected-info"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Datos del modelo IFC extraidos
        const modelData = {
            project: "Vivienda Silvia Cedeno",
            levels: [
                { name: "Nivel 0", elevation: 0 },
                { name: "Nivel 1", elevation: 3 },
                { name: "Nivel 2", elevation: 6 },
                { name: "Nivel 3", elevation: 9 },
                { name: "Nivel 4", elevation: 12 }
            ],
            // Datos aproximados basados en una vivienda tipica
            buildingWidth: 12,
            buildingDepth: 10,
            floorHeight: 3,
            columnSize: 0.3,
            beamSize: { width: 0.25, height: 0.3 },
            wallThickness: 0.15
        };

        let scene, camera, renderer, controls;
        let groups = {
            columns: null,
            beams: null,
            walls: null,
            stairs: null,
            floors: null,
            railings: null
        };
        let wireframeMode = false;

        function init() {
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 30, 80);

            // Camara
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 20, 25);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);

            // Controles
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 6, 0);

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 30, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const dirLight2 = new THREE.DirectionalLight(0x00d4ff, 0.3);
            dirLight2.position.set(-20, 20, -20);
            scene.add(dirLight2);

            // Grid helper
            const gridHelper = new THREE.GridHelper(40, 40, 0x444444, 0x222222);
            scene.add(gridHelper);

            // Crear modelo
            createBuilding();

            // Ocultar loading
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);

            // Resize
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createBuilding() {
            const d = modelData;
            const hw = d.buildingWidth / 2;
            const hd = d.buildingDepth / 2;

            // Materiales
            const materials = {
                column: new THREE.MeshPhongMaterial({ color: 0xe74c3c }),
                beam: new THREE.MeshPhongMaterial({ color: 0x3498db }),
                wall: new THREE.MeshPhongMaterial({ color: 0x95a5a6, transparent: true, opacity: 0.7 }),
                stair: new THREE.MeshPhongMaterial({ color: 0xf39c12 }),
                floor: new THREE.MeshPhongMaterial({ color: 0x27ae60, transparent: true, opacity: 0.5 }),
                railing: new THREE.MeshPhongMaterial({ color: 0x9b59b6 })
            };

            // === COLUMNAS ===
            groups.columns = new THREE.Group();
            groups.columns.name = 'columns';

            // Grid de columnas 4x3
            const colPositions = [
                [-hw, -hd], [-hw, 0], [-hw, hd],
                [0, -hd], [0, 0], [0, hd],
                [hw, -hd], [hw, 0], [hw, hd]
            ];

            for (let level = 0; level < 4; level++) {
                const baseZ = level * d.floorHeight;
                colPositions.forEach((pos, i) => {
                    const colGeo = new THREE.BoxGeometry(d.columnSize, d.floorHeight, d.columnSize);
                    const col = new THREE.Mesh(colGeo, materials.column);
                    col.position.set(pos[0], baseZ + d.floorHeight/2, pos[1]);
                    col.castShadow = true;
                    col.receiveShadow = true;
                    col.userData = { type: 'Columna', level: level, id: `COL-${level}-${i}` };
                    groups.columns.add(col);
                });
            }
            scene.add(groups.columns);

            // === VIGAS ===
            groups.beams = new THREE.Group();
            groups.beams.name = 'beams';

            for (let level = 1; level <= 4; level++) {
                const beamZ = level * d.floorHeight;

                // Vigas en X
                for (let j = 0; j < 3; j++) {
                    const z = -hd + j * hd;
                    const beamGeo = new THREE.BoxGeometry(d.buildingWidth, d.beamSize.height, d.beamSize.width);
                    const beam = new THREE.Mesh(beamGeo, materials.beam);
                    beam.position.set(0, beamZ - d.beamSize.height/2, z);
                    beam.castShadow = true;
                    beam.userData = { type: 'Viga', level: level, direction: 'X' };
                    groups.beams.add(beam);
                }

                // Vigas en Y
                for (let i = 0; i < 3; i++) {
                    const x = -hw + i * hw;
                    const beamGeo = new THREE.BoxGeometry(d.beamSize.width, d.beamSize.height, d.buildingDepth);
                    const beam = new THREE.Mesh(beamGeo, materials.beam);
                    beam.position.set(x, beamZ - d.beamSize.height/2, 0);
                    beam.castShadow = true;
                    beam.userData = { type: 'Viga', level: level, direction: 'Y' };
                    groups.beams.add(beam);
                }
            }
            scene.add(groups.beams);

            // === MUROS ===
            groups.walls = new THREE.Group();
            groups.walls.name = 'walls';

            for (let level = 0; level < 4; level++) {
                const baseZ = level * d.floorHeight;

                // Muros perimetrales
                // Frente
                const wallFront = new THREE.Mesh(
                    new THREE.BoxGeometry(d.buildingWidth, d.floorHeight, d.wallThickness),
                    materials.wall
                );
                wallFront.position.set(0, baseZ + d.floorHeight/2, -hd);
                groups.walls.add(wallFront);

                // Atras
                const wallBack = new THREE.Mesh(
                    new THREE.BoxGeometry(d.buildingWidth, d.floorHeight, d.wallThickness),
                    materials.wall
                );
                wallBack.position.set(0, baseZ + d.floorHeight/2, hd);
                groups.walls.add(wallBack);

                // Izquierda
                const wallLeft = new THREE.Mesh(
                    new THREE.BoxGeometry(d.wallThickness, d.floorHeight, d.buildingDepth),
                    materials.wall
                );
                wallLeft.position.set(-hw, baseZ + d.floorHeight/2, 0);
                groups.walls.add(wallLeft);

                // Derecha
                const wallRight = new THREE.Mesh(
                    new THREE.BoxGeometry(d.wallThickness, d.floorHeight, d.buildingDepth),
                    materials.wall
                );
                wallRight.position.set(hw, baseZ + d.floorHeight/2, 0);
                groups.walls.add(wallRight);

                // Muros interiores
                if (level < 3) {
                    const wallInt = new THREE.Mesh(
                        new THREE.BoxGeometry(d.buildingWidth * 0.4, d.floorHeight, d.wallThickness),
                        materials.wall
                    );
                    wallInt.position.set(hw * 0.3, baseZ + d.floorHeight/2, 0);
                    groups.walls.add(wallInt);
                }
            }
            scene.add(groups.walls);

            // === ESCALERAS ===
            groups.stairs = new THREE.Group();
            groups.stairs.name = 'stairs';

            const stairWidth = 1.2;
            const stairDepth = 3;
            const stepsPerLevel = 17;
            const stepHeight = d.floorHeight / stepsPerLevel;
            const stepDepth = stairDepth / stepsPerLevel;

            for (let level = 0; level < 4; level++) {
                for (let step = 0; step < stepsPerLevel; step++) {
                    const stepGeo = new THREE.BoxGeometry(stairWidth, stepHeight, stepDepth);
                    const stepMesh = new THREE.Mesh(stepGeo, materials.stair);
                    stepMesh.position.set(
                        hw - 2,
                        level * d.floorHeight + step * stepHeight + stepHeight/2,
                        -hd + 1 + step * stepDepth
                    );
                    stepMesh.castShadow = true;
                    stepMesh.userData = { type: 'Escalera', level: level, step: step };
                    groups.stairs.add(stepMesh);
                }
            }
            scene.add(groups.stairs);

            // === LOSAS/PISOS ===
            groups.floors = new THREE.Group();
            groups.floors.name = 'floors';

            for (let level = 0; level <= 4; level++) {
                const floorGeo = new THREE.BoxGeometry(d.buildingWidth, 0.15, d.buildingDepth);
                const floor = new THREE.Mesh(floorGeo, materials.floor);
                floor.position.set(0, level * d.floorHeight, 0);
                floor.receiveShadow = true;
                floor.userData = { type: 'Losa', level: level };
                groups.floors.add(floor);
            }
            scene.add(groups.floors);

            // === BARANDILLAS ===
            groups.railings = new THREE.Group();
            groups.railings.name = 'railings';

            // Barandilla en terraza (nivel 4)
            const railHeight = 1;
            const railThickness = 0.05;

            // Barandilla frontal
            const railFront = new THREE.Mesh(
                new THREE.BoxGeometry(d.buildingWidth, railHeight, railThickness),
                materials.railing
            );
            railFront.position.set(0, 12 + railHeight/2, -hd);
            groups.railings.add(railFront);

            // Barandilla trasera
            const railBack = new THREE.Mesh(
                new THREE.BoxGeometry(d.buildingWidth, railHeight, railThickness),
                materials.railing
            );
            railBack.position.set(0, 12 + railHeight/2, hd);
            groups.railings.add(railBack);

            // Barandillas laterales
            const railLeft = new THREE.Mesh(
                new THREE.BoxGeometry(railThickness, railHeight, d.buildingDepth),
                materials.railing
            );
            railLeft.position.set(-hw, 12 + railHeight/2, 0);
            groups.railings.add(railLeft);

            const railRight = new THREE.Mesh(
                new THREE.BoxGeometry(railThickness, railHeight, d.buildingDepth),
                materials.railing
            );
            railRight.position.set(hw, 12 + railHeight/2, 0);
            groups.railings.add(railRight);

            scene.add(groups.railings);
        }

        function toggleElement(elementType) {
            if (groups[elementType]) {
                groups[elementType].visible = !groups[elementType].visible;

                // Toggle button style
                const buttons = document.querySelectorAll('.btn');
                buttons.forEach(btn => {
                    if (btn.textContent.toLowerCase().includes(elementType.slice(0, 4))) {
                        btn.classList.toggle('active');
                    }
                });
            }
        }

        function resetView() {
            camera.position.set(25, 20, 25);
            controls.target.set(0, 6, 0);
            controls.update();
        }

        function toggleWireframe() {
            wireframeMode = !wireframeMode;
            Object.values(groups).forEach(group => {
                if (group) {
                    group.traverse(child => {
                        if (child.isMesh) {
                            child.material.wireframe = wireframeMode;
                        }
                    });
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Iniciar
        init();
    </script>
</body>
</html>

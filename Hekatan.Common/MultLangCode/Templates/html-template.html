<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Output</title>
    <style>
        /* ========== HTML Parser Template ========== */
        /* Full template for @{html} pure HTML passthrough */

        /* Base typography */
        body {
            font-family: 'Segoe UI', 'Arial Nova', Helvetica, sans-serif;
            font-size: 11pt;
        }

        /* Equation rendering (for mixed content) */
        .eq, table.matrix {
            font-family: 'Georgia Pro', 'Century Schoolbook', 'Times New Roman', Times, serif;
        }
        .eq var { color: #06d; font-size: 105%; }
        .eq i { color: #086; font-style: normal; font-size: 90%; }
        .eq b { font-weight: 600; }
        .eq sub {
            font-family: Calibri, Candara, Corbel, sans-serif;
            font-size: 80%; vertical-align: -18%; margin-left: 1pt;
        }
        .eq sup {
            display: inline-block; margin-left: 1pt; margin-top: -3pt; font-size: 75%;
        }
        .dvc, .dvr, .dvs {
            display: inline-block; vertical-align: middle; white-space: nowrap;
        }
        .dvc { padding-left: 2pt; padding-right: 2pt; text-align: center; line-height: 110%; }
        .dvl { display: block; border-bottom: solid 1pt black; margin-top: 1pt; margin-bottom: 1pt; }
        .matrix { display: inline-table; }
        .matrix .tr { display: table-row; }
        .matrix .td {
            white-space: nowrap; padding: 0 2pt; min-width: 10pt;
            display: table-cell; font-size: 10pt; text-align: center;
        }
        .matrix .td:first-child, .matrix .td:last-child {
            width: 0.75pt; min-width: 0.75pt; max-width: 0.75pt; padding: 0 1pt;
        }
        .matrix .td:first-child { border-left: solid 1pt black; }
        .matrix .td:last-child { border-right: solid 1pt black; }
        .matrix .tr:first-child .td:first-child,
        .matrix .tr:first-child .td:last-child { border-top: solid 1pt black; }
        .matrix .tr:last-child .td:first-child,
        .matrix .tr:last-child .td:last-child { border-bottom: solid 1pt black; }

        /* Verification */
        .ok { color: Green; background-color: #F0FFF0; }
        .err { color: Crimson; background-color: #FEE; }

        /* Tables */
        table { border-collapse: collapse; }
        td, th { padding: 2pt 4pt; vertical-align: top; }
        table.bordered th { background-color: #F0F0F0; border: solid 1pt #AAAAAA; }
        table.bordered td { border: solid 1pt #CCCCCC; }
    </style>
</head>
<body>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hekatan CAS - Symbolic Math Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }

    .app-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;
    }
    .app-header h1 { font-size: 1.4rem; font-weight: 600; }
    .app-header .subtitle { font-size: 0.85rem; opacity: 0.7; }

    .main-layout { display: flex; height: calc(100vh - 60px); }

    .sidebar {
      width: 260px; background: white; border-right: 1px solid #e0e0e0;
      overflow-y: auto; padding: 1rem; flex-shrink: 0;
    }
    .sidebar h3 { font-size: 0.8rem; text-transform: uppercase; color: #666; margin-bottom: 0.5rem; }
    .engine-list { list-style: none; margin-bottom: 1.5rem; }
    .engine-list li {
      padding: 0.5rem 0.7rem; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;
    }
    .engine-list li:hover { background: #f5f5f5; }
    .engine-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .engine-dot.off { background: #ccc; }
    .engine-dot.loading { background: #ffc107; }
    .engine-dot.on { background: #4caf50; }

    .example-list { list-style: none; }
    .example-list li {
      padding: 0.4rem 0.7rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    .example-list li:hover { background: #e3f2fd; }
    .example-list li.active { background: #2196f3; color: white; }

    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      background: white; border-bottom: 1px solid #e0e0e0; padding: 0.5rem 1rem;
      display: flex; gap: 0.5rem; align-items: center;
    }
    .toolbar button {
      padding: 0.4rem 1rem; border: 1px solid #ddd; border-radius: 6px;
      background: white; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
    }
    .toolbar button:hover { background: #f5f5f5; }
    .toolbar button.primary { background: #2196f3; color: white; border-color: #1976d2; }
    .toolbar button.primary:hover { background: #1976d2; }
    .toolbar .status { margin-left: auto; font-size: 0.8rem; color: #888; }

    .split-pane { flex: 1; display: flex; overflow: hidden; }

    .code-panel {
      flex: 1; display: flex; flex-direction: column; border-right: 1px solid #e0e0e0;
    }
    .code-panel textarea {
      flex: 1; border: none; padding: 1rem; font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.9rem; resize: none; outline: none; background: #fafafa; line-height: 1.6;
      tab-size: 2;
    }

    .output-panel { flex: 1; overflow-y: auto; padding: 1rem; background: white; }

    .cas-result {
      margin-bottom: 1rem; padding: 0.8rem; border-radius: 8px; border: 1px solid #e8e8e8;
    }
    .cas-result .expr-input {
      font-family: monospace; font-size: 0.85rem; color: #555; margin-bottom: 0.5rem;
    }
    .cas-result .expr-output { font-size: 1.1rem; }
    .cas-result .expr-output .katex { font-size: 1.2em; }
    .cas-result .engine-badge {
      display: inline-block; font-size: 0.65rem; padding: 0.15rem 0.4rem;
      border-radius: 4px; background: #e3f2fd; color: #1565c0; margin-top: 0.3rem;
    }
    .cas-result .timing { font-size: 0.7rem; color: #999; margin-left: 0.5rem; }
    .cas-result.error { border-color: #ffcdd2; background: #fff5f5; }
    .cas-result.error .expr-output { color: #c62828; font-size: 0.85rem; }
    .cas-result.loading { opacity: 0.6; }

    .cas-comment { color: #888; font-style: italic; margin-bottom: 0.5rem; }
    .cas-text { color: #333; margin-bottom: 0.5rem; }
  </style>
  <script type="module" crossorigin src="/assets/editor-SNZ3BaLx.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/casManager-GTGDkSkn.js">
</head>
<body>
  <div class="app-header">
    <h1>Hekatan CAS</h1>
    <span class="subtitle">Symbolic Math — Giac | SymPy | Maxima | SymEngine</span>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <h3>Motores CAS</h3>
      <ul class="engine-list" id="engineList">
        <li data-engine="giac"><span class="engine-dot off" id="dot-giac"></span> Giac/Xcas</li>
        <li data-engine="sympy"><span class="engine-dot off" id="dot-sympy"></span> SymPy</li>
        <li data-engine="maxima"><span class="engine-dot off" id="dot-maxima"></span> Maxima</li>
        <li data-engine="symengine"><span class="engine-dot off" id="dot-symengine"></span> SymEngine</li>
      </ul>

      <h3>Ejemplos</h3>
      <ul class="example-list" id="exampleList"></ul>
    </div>

    <div class="editor-area">
      <div class="toolbar">
        <button class="primary" id="btnRun">&#9654; Ejecutar</button>
        <button id="btnInitAll">Cargar Todos</button>
        <select id="engineSelect">
          <option value="">Cascada (auto)</option>
          <option value="giac">Giac/Xcas</option>
          <option value="sympy">SymPy</option>
          <option value="maxima">Maxima</option>
          <option value="symengine">SymEngine</option>
        </select>
        <span class="status" id="statusText">Listo</span>
      </div>

      <div class="split-pane">
        <div class="code-panel">
          <textarea id="codeInput" spellcheck="false" placeholder="Escribe expresiones simbolicas aqui...
# Comentarios con #
> Texto con >

Ejemplos:
diff(sin(x)*x^2, x)
integrate(exp(-x^2), x, -oo, oo)
solve(x^3 - 6*x^2 + 11*x - 6, x)
"></textarea>
        </div>
        <div class="output-panel" id="output"></div>
      </div>
    </div>
  </div>

</body>
</html>
